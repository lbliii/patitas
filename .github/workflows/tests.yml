name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly: the slow-tests job (below) runs the perf/differential suite that
    # is deselected from per-PR runs.
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14t"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests (fast; slow perf/differential tests run in the nightly slow-tests job)
        env:
          CI: true
          PYTHON_GIL: "0"
        run: |
          uv run pytest -n auto -q --tb=short --dist worksteal -m "not slow"

      - name: Run tests with coverage
        if: matrix.python-version == '3.14t'
        env:
          CI: true
          PYTHON_GIL: "0"
        run: |
          uv run pytest -n 0 -q --tb=short -m "not slow" --cov=patitas --cov-report=xml --cov-fail-under=67

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.14t'
        uses: codecov/codecov-action@v7
        with:
          files: coverage.xml
          fail_ci_if_error: false

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14t"

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run ty
        run: |
          uv run ty check src/patitas

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14t"

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run ruff check
        run: |
          uv run ruff check src/patitas tests/

      - name: Run ruff format check
        run: |
          uv run ruff format --check src/patitas tests/

  commonmark-spec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14t"

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run CommonMark spec tests
        env:
          CI: true
          PYTHON_GIL: "0"
        run: |
          uv run pytest tests/test_commonmark_spec.py -v --tb=short

  benchmarks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14t"

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run benchmarks
        env:
          CI: true
          PYTHON_GIL: "0"
        run: |
          uv run pytest benchmarks/benchmark_scaling.py benchmarks/benchmark_phase_breakdown.py benchmarks/benchmark_excerpt.py -v --benchmark-only --benchmark-json=benchmarks/ci_results.json -q

      - name: Check thresholds
        run: |
          uv run python benchmarks/check_thresholds.py

      # Parallel-scaling guard: noisy on shared runners, so nightly/manual only.
      - name: Run parallel-scaling benchmark
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          CI: true
          PYTHON_GIL: "0"
        run: |
          uv run python benchmarks/benchmark_parallel.py --json benchmarks/scaling_results.json

      - name: Check parallel-scaling floor
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          uv run python benchmarks/check_scaling.py

  slow-tests:
    # The expensive perf-bound + differential-fuzz suites (pytest -m slow) are
    # deselected from per-PR runs above. Run them nightly (cron) and on demand
    # (workflow_dispatch), not on every push/PR.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14t"

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run slow tests (perf bounds + differential fuzz)
        env:
          CI: true
          PYTHON_GIL: "0"
        run: |
          uv run pytest -m slow -q --tb=short
